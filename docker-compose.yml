version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: llm-proxy-db
    environment:
      POSTGRES_DB: llm_proxy
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - llm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: llm-proxy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - llm-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: llm-proxy-server
    environment:
      DATABASE_URL: postgresql://llm_user:llm_password@postgres:5432/llm_proxy
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - llm-network

  # Frontend Client (optional, for development)
  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #   container_name: llm-proxy-client
  #   ports:
  #     - "80:80"
  #   networks:
  #     - llm-network

  # Nginx Reverse Proxy (production)
  nginx:
    image: nginx:alpine
    container_name: llm-proxy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - server
    networks:
      - llm-network

volumes:
  postgres_data:
  redis_data:

networks:
  llm-network:
    driver: bridge
